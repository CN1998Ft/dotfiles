# Remap leader key
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g cursor-style block
set -g allow-predictions on

# Reload config
unbind r
bind r source ~/.tmux.conf

# Miscellaneous
set -g mouse on
set -g allow-rename off

# Navigate pane like vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy mode like vim
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Color scheme
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#2d353b,fg=#d3c6aa"

set -g status-left "#[fg=#a7c080,bg=#343f44]▌#[fg=#ffffff] #{user} #[fg=#a7c080,bg=#343f44]▌ "
set -g status-left-length 50
set -g status-right "#[fg=#7fbbb3,bg=#2d353b]#[fg=#132326,bg=#7fbbb3] #[fg=#d3C6AA,bg=#3a3f5a] #W #{?client_prefix,#[fg=#e67e80],#[fg=#83c092]}#[bg=#3a3f5a]#{?client_prefix,#[bg=#e67e80],#[bg=#83c092]}#[fg=#132326] #[fg=#d3C6AA,bg=#3a3f5a] #S "
set -g status-right-length 80

# Inactive: right-capped subtle bg (trailing arrow = forest trail effect)
set -g window-status-format "#[bg=#343f44,fg=#7a8478] #I:#{?window_flags, #{window_flags},} #W #[fg=#343f44,bg=#2d353b]▌"
set -g window-status-separator ""

# Active: right-capped aqua (trailing arrow, same trail shape but brighter)
set -g window-status-current-format "#[bg=#83c092,fg=#2d353b,bold] #I:(✓) #W #[fg=#83c092,bg=#2d353b]▌"
